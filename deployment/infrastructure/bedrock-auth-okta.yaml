AWSTemplateFormatVersion: '2010-09-09'
Description: 'Claude Code with Bedrock - Okta Authentication Stack'

Parameters:
  FederationType:
    Type: String
    Default: direct
    AllowedValues:
      - direct
      - cognito
    Description: Authentication mode - Direct IAM or Cognito Identity Pool

  OktaDomain:
    Type: String
    Description: Your Okta domain (e.g., company.okta.com or dev-123456.oktapreview.com)
    AllowedPattern: '^[a-zA-Z0-9][a-zA-Z0-9-]*\.okta(preview|-emea)?\.com$'
    ConstraintDescription: Must be a valid Okta domain (okta.com, oktapreview.com, or okta-emea.com)

  OktaClientId:
    Type: String
    Description: Okta application client ID
    AllowedPattern: '^[a-zA-Z0-9]{20}$'
    ConstraintDescription: Must be a valid Okta client ID

  OktaAuthServerId:
    Type: String
    Default: default
    Description: >-
      Okta Custom Authorization Server ID. Integrator / Developer tenants and most
      Workforce Identity deployments ship a CAS literally named "default" — leave
      this parameter alone unless your Okta admin created a differently-named CAS.
      Changing this value on an existing stack replaces the OIDC provider (URL is
      immutable); only set it at initial deploy time.
    AllowedPattern: '^[A-Za-z0-9][A-Za-z0-9-]*$'
    ConstraintDescription: Must be a valid Okta authorization server id (letters, digits, hyphens)

  IdentityPoolName:
    Type: String
    Default: claude-code-okta
    Description: Name for the Cognito Identity Pool (used in cognito mode)
    AllowedPattern: '^[\w\s+=,.@-]+$'
    MaxLength: 128

  FederatedRoleName:
    Type: String
    Default: BedrockOktaFederatedRole
    Description: Name for the IAM role used for federation
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9-_]*$'
    MaxLength: 64

  AllowedBedrockRegions:
    Type: CommaDelimitedList
    Default: 'us-east-1,us-west-2'
    Description: Comma-delimited list of AWS regions where Bedrock access is allowed

  EnableMonitoring:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable CloudWatch monitoring for Bedrock usage

  EnforceProjectIsolation:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: >-
      When 'true', tightens the Bedrock access policy to enforce GDPR per-zone
      isolation: InvokeModel* / Converse* are denied unless the caller's STS
      session has both Project and Zone tags, AND the invoked application
      inference profile carries a Zone tag matching the caller's Zone.
      Foundation-model and cross-region system-profile invocations are blocked;
      all traffic must go through tagged application inference profiles.
      Pair with `ccwb inference-profile create` and the shell-function wrapper
      emitted by the installer. Default 'false' preserves today's behavior.

Conditions:
  UseDirectIAM: !Equals [!Ref FederationType, direct]
  UseCognitoIdentity: !Equals [!Ref FederationType, cognito]
  MonitoringEnabled: !Equals [!Ref EnableMonitoring, 'true']
  IsolationEnforced: !Equals [!Ref EnforceProjectIsolation, 'true']
  # Partition-aware conditions for Cognito Identity service principals
  IsGovCloudWest: !Equals [!Ref 'AWS::Region', 'us-gov-west-1']
  IsGovCloudEast: !Equals [!Ref 'AWS::Region', 'us-gov-east-1']
  IsGovCloud: !Or [!Condition IsGovCloudWest, !Condition IsGovCloudEast]

Resources:
  # ===============================================
  # OIDC Provider for Okta
  # ===============================================

  OktaOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      # Register the Okta Custom Authorization Server as the OIDC issuer.
      # Tokens from the CAS carry iss=https://<domain>/oauth2/<cas-id>, and
      # IAM's InvalidIdentityToken check compares that iss against this URL
      # character-for-character. The Org AS (iss=https://<domain>) cannot
      # host admin-defined custom claims and therefore cannot emit the
      # https://aws.amazon.com/tags claim required for per-project cost
      # attribution -- so we always point at a CAS here, defaulting to the
      # pre-provisioned "default" CAS.
      #
      # NOTE: AWS::IAM::OIDCProvider.Url is immutable. Changing
      # OktaAuthServerId on an already-deployed stack will REPLACE the
      # resource (delete the old provider, create a new one); expect a
      # brief window during stack update when no provider exists. In
      # practice, set the CAS id once at initial deploy.
      Url: !Sub 'https://${OktaDomain}/oauth2/${OktaAuthServerId}'
      ClientIdList:
        - !Ref OktaClientId
      ThumbprintList:
        - 9e99a48a9960b14926bb7f3b02e22da2b0ab7280  # Okta's thumbprint
      Tags:
        - Key: Purpose
          Value: Claude Code Okta Authentication
        - Key: Provider
          Value: Okta

  # ===============================================
  # Bedrock Access Policy (Shared)
  # ===============================================

  BedrockAccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Policy for accessing Bedrock services
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # --- Permissive Invoke statements (isolation OFF — today's behavior) ---
          - !If
            - IsolationEnforced
            - !Ref 'AWS::NoValue'
            - Sid: AllowBedrockInvokeRegional
              Effect: Allow
              Action:
                - 'bedrock:InvokeModel'
                - 'bedrock:InvokeModelWithResponseStream'
                - 'bedrock-runtime:InvokeModel'
                - 'bedrock-runtime:InvokeModelWithResponseStream'
                - 'bedrock-runtime:ConverseStream'
                - 'bedrock-runtime:Converse'
              Resource:
                - !Sub 'arn:${AWS::Partition}:bedrock:*::foundation-model/*'
                - !Sub 'arn:${AWS::Partition}:bedrock:*:*:inference-profile/*'
              Condition:
                StringEquals:
                  'aws:RequestedRegion': !Ref AllowedBedrockRegions
          - !If
            - IsolationEnforced
            - !Ref 'AWS::NoValue'
            - Sid: AllowBedrockInvokeGlobal
              Effect: Allow
              Action:
                - 'bedrock:InvokeModel'
                - 'bedrock:InvokeModelWithResponseStream'
                - 'bedrock-runtime:InvokeModel'
                - 'bedrock-runtime:InvokeModelWithResponseStream'
                - 'bedrock-runtime:ConverseStream'
                - 'bedrock-runtime:Converse'
              Resource:
                - !Sub 'arn:${AWS::Partition}:bedrock:::foundation-model/*'

          # --- GDPR isolation statements (isolation ON) ---
          # Explicit Deny catches any caller whose Okta token didn't populate
          # both Project and Zone session tags (e.g. authenticated user who
          # is not in an Okta project group). Explicit Deny wins over any
          # Allow, so this is the airtight GDPR boundary regardless of what
          # the client-side shell function does.
          - !If
            - IsolationEnforced
            - Sid: DenyBedrockInvokeWithoutProjectOrZone
              Effect: Deny
              Action:
                - 'bedrock:InvokeModel*'
                - 'bedrock-runtime:InvokeModel*'
                - 'bedrock-runtime:Converse*'
              Resource: '*'
              Condition:
                'Null':
                  'aws:PrincipalTag/Project': 'true'
                  'aws:PrincipalTag/Zone': 'true'
            - !Ref 'AWS::NoValue'
          # Allow only application-inference-profile invocations whose Zone
          # resource tag matches the caller's Zone session tag. The
          # ${!aws:PrincipalTag/Zone} escape keeps CFN from substituting --
          # AWS evaluates the policy variable at request time.
          - !If
            - IsolationEnforced
            - Sid: AllowBedrockInvokeInZone
              Effect: Allow
              Action:
                - 'bedrock:InvokeModel'
                - 'bedrock:InvokeModelWithResponseStream'
                - 'bedrock-runtime:InvokeModel'
                - 'bedrock-runtime:InvokeModelWithResponseStream'
                - 'bedrock-runtime:ConverseStream'
                - 'bedrock-runtime:Converse'
              Resource:
                - !Sub 'arn:${AWS::Partition}:bedrock:*:*:application-inference-profile/*'
              Condition:
                StringEquals:
                  'aws:RequestedRegion': !Ref AllowedBedrockRegions
                  'aws:ResourceTag/Zone': '${aws:PrincipalTag/Zone}'
            - !Ref 'AWS::NoValue'

          # --- List / discovery permissions (always) ---
          - Sid: AllowBedrockListRegional
            Effect: Allow
            Action:
              - 'bedrock:ListFoundationModels'
              - 'bedrock:GetFoundationModel'
              - 'bedrock:GetFoundationModelAvailability'
              - 'bedrock:ListInferenceProfiles'
              - 'bedrock:GetInferenceProfile'
            Resource: '*'
            Condition:
              StringEquals:
                'aws:RequestedRegion': !Ref AllowedBedrockRegions
          - Sid: AllowBedrockListGlobal
            Effect: Allow
            Action:
              - 'bedrock:ListFoundationModels'
              - 'bedrock:GetFoundationModel'
              - 'bedrock:GetFoundationModelAvailability'
              - 'bedrock:ListInferenceProfiles'
              - 'bedrock:GetInferenceProfile'
            Resource: '*'
          - !If
            - MonitoringEnabled
            - Sid: AllowCloudWatchMetrics
              Effect: Allow
              Action:
                - 'cloudwatch:PutMetricData'
              Resource: '*'
              Condition:
                StringEquals:
                  'cloudwatch:namespace':
                    - 'ClaudeCode/Bedrock/Usage'
                    - 'AWS/Bedrock'
            - !Ref 'AWS::NoValue'

  # ===============================================
  # Direct IAM Resources (when FederationType=direct)
  # ===============================================

  DirectIAMRole:
    Type: AWS::IAM::Role
    Condition: UseDirectIAM
    Properties:
      RoleName: !Ref FederatedRoleName
      Description: Direct IAM role for Okta users accessing Bedrock
      MaxSessionDuration: 43200  # 12 hours
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt OktaOIDCProvider.Arn
            Action:
              - 'sts:AssumeRoleWithWebIdentity'
              - 'sts:TagSession'
      ManagedPolicyArns:
        - !Ref BedrockAccessPolicy
      Tags:
        - Key: Purpose
          Value: Claude Code Direct IAM Authentication
        - Key: Provider
          Value: Okta
        - Key: FederationType
          Value: direct

  # ===============================================
  # Cognito Identity Pool Resources (when FederationType=cognito)
  # ===============================================

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Condition: UseCognitoIdentity
    Properties:
      IdentityPoolName: !Ref IdentityPoolName
      AllowUnauthenticatedIdentities: false
      AllowClassicFlow: false
      OpenIdConnectProviderARNs:
        - !GetAtt OktaOIDCProvider.Arn

  CognitoAuthenticatedRole:
    Type: AWS::IAM::Role
    Condition: UseCognitoIdentity
    Properties:
      Description: Role for authenticated Cognito Identity Pool users
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - IsGovCloudWest
                - cognito-identity-us-gov.amazonaws.com
                - !If
                  - IsGovCloudEast
                  - cognito-identity.us-gov-east-1.amazonaws.com
                  - cognito-identity.amazonaws.com
            Action:
              - 'sts:AssumeRoleWithWebIdentity'
            Condition:
              StringEquals:
                !If
                  - IsGovCloudWest
                  - 'cognito-identity-us-gov.amazonaws.com:aud': !Ref CognitoIdentityPool
                  - !If
                    - IsGovCloudEast
                    - 'cognito-identity.us-gov-east-1.amazonaws.com:aud': !Ref CognitoIdentityPool
                    - 'cognito-identity.amazonaws.com:aud': !Ref CognitoIdentityPool
              'ForAnyValue:StringLike':
                !If
                  - IsGovCloudWest
                  - 'cognito-identity-us-gov.amazonaws.com:amr': authenticated
                  - !If
                    - IsGovCloudEast
                    - 'cognito-identity.us-gov-east-1.amazonaws.com:amr': authenticated
                    - 'cognito-identity.amazonaws.com:amr': authenticated
      ManagedPolicyArns:
        - !Ref BedrockAccessPolicy
      Tags:
        - Key: Purpose
          Value: Claude Code Cognito Authentication
        - Key: Provider
          Value: Okta

  CognitoUnauthenticatedRole:
    Type: AWS::IAM::Role
    Condition: UseCognitoIdentity
    Properties:
      Description: Role for unauthenticated Cognito Identity Pool users (restricted)
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - IsGovCloudWest
                - cognito-identity-us-gov.amazonaws.com
                - !If
                  - IsGovCloudEast
                  - cognito-identity.us-gov-east-1.amazonaws.com
                  - cognito-identity.amazonaws.com
            Action:
              - 'sts:AssumeRoleWithWebIdentity'
            Condition:
              StringEquals:
                !If
                  - IsGovCloudWest
                  - 'cognito-identity-us-gov.amazonaws.com:aud': !Ref CognitoIdentityPool
                  - !If
                    - IsGovCloudEast
                    - 'cognito-identity.us-gov-east-1.amazonaws.com:aud': !Ref CognitoIdentityPool
                    - 'cognito-identity.amazonaws.com:aud': !Ref CognitoIdentityPool
              'ForAnyValue:StringLike':
                !If
                  - IsGovCloudWest
                  - 'cognito-identity-us-gov.amazonaws.com:amr': unauthenticated
                  - !If
                    - IsGovCloudEast
                    - 'cognito-identity.us-gov-east-1.amazonaws.com:amr': unauthenticated
                    - 'cognito-identity.amazonaws.com:amr': unauthenticated
      Policies:
        - PolicyName: DenyAll
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: '*'
                Resource: '*'
      Tags:
        - Key: Purpose
          Value: Claude Code Cognito Unauthenticated Role
        - Key: Provider
          Value: Okta

  CognitoIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Condition: UseCognitoIdentity
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        authenticated: !GetAtt CognitoAuthenticatedRole.Arn
        unauthenticated: !GetAtt CognitoUnauthenticatedRole.Arn

  # Principal Tag Mapping for Session Tags
  IdentityPoolPrincipalTag:
    Type: AWS::Cognito::IdentityPoolPrincipalTag
    Condition: UseCognitoIdentity
    DeletionPolicy: Delete
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      IdentityProviderName: !Ref OktaDomain
      UseDefaults: false
      PrincipalTags:
        UserEmail: email
        UserId: sub
        UserName: name

  # ===============================================
  # Optional Monitoring Resources
  # ===============================================

  BedrockAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: MonitoringEnabled
    Properties:
      LogGroupName: !Sub '/aws/bedrock/claude-code-${AWS::StackName}'
      RetentionInDays: 30

Outputs:
  FederationType:
    Description: Current federation type configuration
    Value: !Ref FederationType
    Export:
      Name: !Sub '${AWS::StackName}-FederationType'

  OIDCProviderArn:
    Description: ARN of the Okta OIDC Provider
    Value: !GetAtt OktaOIDCProvider.Arn
    Export:
      Name: !Sub '${AWS::StackName}-OIDCProviderArn'

  FederatedRoleArn:
    Description: ARN of the federated role for Okta users
    Value: !If
      - UseDirectIAM
      - !GetAtt DirectIAMRole.Arn
      - !GetAtt CognitoAuthenticatedRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-FederatedRoleArn'

  DirectSTSRoleArn:
    Description: Direct STS federated role ARN (when using direct IAM)
    Condition: UseDirectIAM
    Value: !GetAtt DirectIAMRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DirectSTSRoleArn'

  BedrockRoleArn:
    Description: IAM Role ARN for Bedrock access (for backward compatibility)
    Value: !If
      - UseDirectIAM
      - !GetAtt DirectIAMRole.Arn
      - !GetAtt CognitoAuthenticatedRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BedrockRoleArn'

  IdentityPoolId:
    Description: Cognito Identity Pool ID (if using Cognito mode)
    Condition: UseCognitoIdentity
    Value: !Ref CognitoIdentityPool
    Export:
      Name: !Sub '${AWS::StackName}-IdentityPoolId'

  BedrockPolicyArn:
    Description: ARN of the Bedrock access policy
    Value: !Ref BedrockAccessPolicy
    Export:
      Name: !Sub '${AWS::StackName}-BedrockPolicyArn'

  ConfigurationJson:
    Description: Configuration JSON for CLI tool
    Value: !If
      - UseDirectIAM
      - !Sub |
        {
          "federation_type": "direct",
          "provider_type": "okta",
          "provider_domain": "${OktaDomain}",
          "client_id": "${OktaClientId}",
          "federated_role_arn": "${DirectIAMRole.Arn}",
          "aws_region": "${AWS::Region}",
          "max_session_duration": 43200
        }
      - !Sub |
        {
          "federation_type": "cognito",
          "provider_type": "okta",
          "provider_domain": "${OktaDomain}",
          "client_id": "${OktaClientId}",
          "identity_pool_id": "${CognitoIdentityPool}",
          "federated_role_arn": "${CognitoAuthenticatedRole.Arn}",
          "aws_region": "${AWS::Region}"
        }
